kind = "web"
previewPath = "/"
title = "3D Agent World"
version = "1.0.0"
id = "artifacts/avatar-world"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18973
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/avatar-world run dev"

[services.env]
PORT = "18973"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/avatar-world", "run", "build"]
publicDir = "artifacts/avatar-world/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
